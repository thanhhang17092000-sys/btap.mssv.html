<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Card Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f2f2f2;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px;
}

h1{
    margin-bottom:15px;
}

.info{
    display:flex;
    gap:30px;
    margin-bottom:20px;
    font-size:20px;
    font-weight:bold;
}

button{
    padding:10px 20px;
    margin-bottom:20px;
    cursor:pointer;
}

.game{
    display:grid;
    grid-template-columns:repeat(4,120px);
    gap:15px;
}

.card{
    width:120px;
    height:120px;
    perspective:1000px;
    cursor:pointer;
}

.inner{
    width:100%;
    height:100%;
    position:relative;
    transition:.6s;
    transform-style:preserve-3d;
}

.card.flip .inner{
    transform:rotateY(180deg);
}

.front,.back{

    position:absolute;
    width:100%;
    height:100%;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    backface-visibility:hidden;
}

.front{
    background:#3498db;
    color:white;
}

.back{
    background:white;
    transform:rotateY(180deg);
    border:2px solid #3498db;
}

.card:hover{
    transform:scale(1.05);
}

@media(max-width:700px){

.game{
grid-template-columns:repeat(2,120px);
}

}

</style>

</head>
<body>

<h1>Memory Card Flip Game</h1>

<div class="info">
<div>Moves: <span id="moves">0</span></div>
<div>Matched: <span id="matched">0</span>/4</div>
</div>

<button onclick="resetGame()">Reset Game</button>

<div class="game" id="game"></div>

<script>

const emojis=["🍎","🍌","🍇","🍒"];

let cards=[];
let first=null;
let second=null;
let lock=false;

let moves=0;
let matched=0;

function shuffle(arr){

return arr.sort(()=>Math.random()-0.5);

}

function createGame(){

cards=shuffle([...emojis,...emojis]);

const game=document.getElementById("game");

game.innerHTML="";

cards.forEach((emoji,index)=>{

const card=document.createElement("div");

card.className="card";

card.dataset.value=emoji;

card.dataset.index=index;

card.innerHTML=`

<div class="inner">

<div class="front">?</div>

<div class="back">${emoji}</div>

</div>

`;

card.onclick=()=>flip(card);

game.appendChild(card);

});

}

function flip(card){

if(lock) return;

if(card===first) return;

if(card.classList.contains("matched")) return;

card.classList.add("flip");

if(!first){

first=card;

return;

}

second=card;

moves++;

document.getElementById("moves").innerHTML=moves;

check();

}

function check(){

if(first.dataset.value===second.dataset.value){

first.classList.add("matched");

second.classList.add("matched");

matched++;

document.getElementById("matched").innerHTML=matched;

first=null;

second=null;

if(matched==4){

setTimeout(()=>{

alert("Bạn đã chiến thắng!");

},300);

}

}else{

lock=true;

setTimeout(()=>{

first.classList.remove("flip");

second.classList.remove("flip");

first=null;

second=null;

lock=false;

},800);

}

}

function resetGame(){

moves=0;

matched=0;

document.getElementById("moves").innerHTML=0;

document.getElementById("matched").innerHTML=0;

createGame();

}

createGame();

</script>

</body>
</html>
